name: CI Pipeline

on:
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ToDoApp.sln

      - name: Build solution
        run: dotnet build ToDoApp.sln --configuration Release

      - name: Run tests
        run: dotnet test ToDoApp.sln --logger "trx;LogFileName=test_results.trx"

  analysis:
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v3

      - name: Count lines of code with CLOC
        run: |
          choco install cloc -y
          cloc ToDoApp > cloc-report.txt
          type cloc-report.txt

      - name: Run SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORG: ${{ secrets.SONAR_ORG }}
        run: |
          Write-Host "SONAR_ORG length: $($env:SONAR_ORG.Length)"
          Write-Host "SONAR_TOKEN length: $($env:SONAR_TOKEN.Length)"
          dotnet tool install --global dotnet-sonarscanner
          dotnet sonarscanner begin /k:"Artemian21_ToDoApp" /o:"$env:SONAR_ORG" /d:sonar.login="$env:SONAR_TOKEN"
          dotnet build ToDoApp.sln
          dotnet sonarscanner end /d:sonar.login="$env:SONAR_TOKEN"

      - name: Code Review Check
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setFailed("Це не Pull Request");
              return;
            }

            const prNumber = pr.number;
            const prAuthor = pr.user.login;

            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            console.log("Всі рев’ю:");
            reviews.forEach(r => {
              console.log(`User: ${r.user.login}, State: ${r.state}`);
            });

            if (pr.user.login === context.actor) {
              console.log("Автор PR - це виконавець");
            } else {
              const approved = reviews.some(review => review.state === 'APPROVED');
              if (!approved) {
                core.setFailed("Код-рев’ю не схвалено");
              } else {
                console.log("Є схвалене рев’ю");
              }
            }